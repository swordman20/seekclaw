# 发布工作流：刷新 Cloudflare 缓存
# 触发：GitHub Release 从 Draft 发布为 Published
# 此处不上传文件到外部存储，仅触发缓存清理，因为文件通过网关代理透明通过。

name: Publish Release

on:
  release:
    types: [published]

env:
  CDN_DOMAIN: dl.zknav.cn

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # 刷新 Cloudflare CDN 缓存
      - name: 刷新 Cloudflare 缓存
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files": [
              "https://${{ env.CDN_DOMAIN }}/releases/latest-mac.yml",
              "https://${{ env.CDN_DOMAIN }}/releases/latest.yml"
            ]}'
          echo "Cloudflare 缓存刷新已提交"
