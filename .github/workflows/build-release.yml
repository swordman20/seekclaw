# 自动构建 + 发布工作流
# 触发：推送 v* 标签（如 git tag v2026.318.0 && git push origin v2026.318.0）
# 版本号格式：YYYY.MMDD.N（年.月日.当天构建序号），从 tag 自动提取
# 流程：4 并行构建 → 合并 yml → 创建 GitHub Release

name: Build & Release

on:
  push:
    tags: ["v*"]
  pull_request:       # PR 触发构建验证（不发布）
  workflow_dispatch:  # 允许在任意分支上手动触发构建（不发布）

# package-resources.js 使用 OPENCLAW_PACKAGE_SOURCE 固定 openclaw 版本
env:
  OPENCLAW_PACKAGE_SOURCE: "2026.3.13"
  SEEKCLAW_CLAWHUB_REGISTRY: ${{ vars.SEEKCLAW_CLAWHUB_REGISTRY }}
  SEEKCLAW_GATEWAY_ASAR: "1"
  ARTIFACT_RETENTION_DAYS: 3
  # 埋点配置
  SEEKCLAW_ANALYTICS_API_KEY: ${{ secrets.SEEKCLAW_ANALYTICS_API_KEY }}
  SEEKCLAW_ANALYTICS_CAPTURE_URL: ${{ secrets.SEEKCLAW_ANALYTICS_CAPTURE_URL }}
  SEEKCLAW_ANALYTICS_CAPTURE_FALLBACK_URL: ${{ secrets.SEEKCLAW_ANALYTICS_CAPTURE_FALLBACK_URL }}

jobs:
  # ── macOS arm64 ──
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # 从 git tag 提取版本号写入 package.json
      - name: 注入版本号
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: 构建 macOS arm64
        run: npm run dist:mac:arm64

      - name: 清理 blockmap（macOS arm64）
        run: find out/darwin-arm64 -type f -name "*.blockmap" -delete

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            out/darwin-arm64/*.dmg
            out/darwin-arm64/*.zip
            out/darwin-arm64/latest-mac.yml

  # ── macOS x64 ──
  build-mac-x64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: 注入版本号
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: 构建 macOS x64
        run: npm run dist:mac:x64

      - name: 清理 blockmap（macOS x64）
        run: find out/darwin-x64 -type f -name "*.blockmap" -delete

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            out/darwin-x64/*.dmg
            out/darwin-x64/*.zip
            out/darwin-x64/latest-mac.yml

  # ── Windows x64 ──
  build-win-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: 注入版本号
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: 让 npm 通过 bash 执行 scripts
        run: npm config set script-shell "$(which bash)"

      - name: 构建 Windows x64
        run: npm run dist:win:x64

      - name: 清理 blockmap（Windows x64）
        run: find out/win32-x64 -type f -name "*.blockmap" -delete

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            out/win32-x64/*.exe
            out/win32-x64/latest.yml

  # ── Windows arm64 ──
  build-win-arm64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: 注入版本号
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: 让 npm 通过 bash 执行 scripts
        run: npm config set script-shell "$(which bash)"

      - name: 构建 Windows arm64
        run: npm run dist:win:arm64

      - name: 清理 blockmap（Windows arm64）
        run: find out/win32-arm64 -type f -name "*.blockmap" -delete

      - uses: actions/upload-artifact@v4
        with:
          name: win-arm64
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            out/win32-arm64/*.exe
            out/win32-arm64/latest.yml

  # ── 合并 + 创建 GitHub Release ──
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac-arm64, build-mac-x64, build-win-x64, build-win-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: out/darwin-arm64

      - uses: actions/download-artifact@v4
        with:
          name: mac-x64
          path: out/darwin-x64

      - uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: out/win32-x64

      - uses: actions/download-artifact@v4
        with:
          name: win-arm64
          path: out/win32-arm64

      - run: npm install js-yaml

      - name: 合并发布文件
        run: node scripts/merge-release-yml.js

      - name: 二次清理 blockmap（release）
        run: find out -type f -name "*.blockmap" -delete

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/release/*
          draft: true
          generate_release_notes: true
