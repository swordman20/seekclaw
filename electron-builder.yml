appId: com.seekclaw.app
productName: SeekClaw
copyright: Copyright © 2025 SeekClaw

directories:
  output: out

files:
  - dist/**/*
  - chat-ui/dist/**/*
  - setup/**/*
  - settings/**/*
  - assets/**/*
  - package.json

# afterPack 钩子：绕过 node_modules 剥离，直接注入 resources/ 到 app bundle
afterPack: ./scripts/afterPack.js

# --- macOS ---
mac:
  target:
    - dmg   # 手动分发
    - zip   # 自动更新（electron-updater 在 macOS 上要求 zip）
  icon: assets/icon.icns
  category: public.app-category.productivity
  # zip artifactName 含 arch + -mac 后缀，供 electron-updater findFile 按架构匹配
  artifactName: "SeekClaw-${version}-${arch}-mac.${ext}"
  # 移除签名/公证要求，使用 ad-hoc 签名
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false

# 自动更新：指向 Cloudflare R2 加速域名
publish:
  provider: generic
  url: https://download.sc.zknav.cn/releases/

dmg:
  sign: false
  title: "SeekClaw ${version} Mac"
  # 不生成 .background.tiff
  background: null
  # 关闭 DMG 差分更新元数据，避免生成 .dmg.blockmap
  writeUpdateInfo: false
  artifactName: "SeekClaw-${version}-${arch}.${ext}"
  window:
    width: 540
    height: 450
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 270
      y: 80
      path: assets/已损坏修复.app

# --- Windows ---
win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  # 安装前强制终止旧进程，避免托盘模式下 WM_CLOSE 被拦截
  include: "scripts/installer.nsh"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  # 关闭 NSIS 差分包，避免生成 .exe.blockmap
  differentialPackage: false
  artifactName: "SeekClaw-Setup-${version}-${arch}.${ext}"
